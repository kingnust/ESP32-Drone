; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:4d_systems_esp32s3_gen4_r8n16]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino
monitor_speed = 115200
build_unflags = 
	-DARDUINO_USB_CDC_ON_BOOT=1
build_flags = 
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DBOARD_NAME=\"ESP32S3\"
	-include include/bmi088_esp32_fix.h
lib_deps = 
	adafruit/Adafruit NeoPixel@^1.15.5
	adafruit/Adafruit BMP3XX Library@^2.1.6
	bolderflight/Bolder Flight Systems BMI088@^1.0.1
	bitcraze/Bitcraze PMW3901@^1.2
	adafruit/Adafruit TCS34725@^1.4.4
	dfrobot/DFRobot_BMM150@^1.0.0
	pololu/VL53L1X@^1.3.1
	reefwing-software/Reefwing_imuTypes@^2.0.3
	reefwing-software/ReefwingAHRS@^2.3.7
	alfredosystems/AlfredoCRSF@^1.0.1
