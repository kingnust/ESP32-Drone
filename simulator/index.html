<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ELRS Drone Simulator</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, Segoe UI, system-ui, sans-serif;
      background: #0f1315;
      color: #eef4f7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: #0f1315;
    }

    canvas {
      display: block;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      background: rgba(15, 19, 21, 0.82);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
    }

    .brand {
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button,
    select {
      height: 34px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      padding: 0 11px;
      color: #eef4f7;
      background: #1b2328;
      font: inherit;
      font-size: 13px;
    }

    button {
      cursor: pointer;
    }

    button:hover,
    select:hover {
      background: #263139;
    }

    button.primary {
      border-color: #5ad4c7;
      background: #117167;
    }

    button.primary:hover {
      background: #168579;
    }

    .panel {
      position: fixed;
      z-index: 3;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      background: rgba(15, 19, 21, 0.82);
      backdrop-filter: blur(14px);
    }

    .telemetry {
      left: 12px;
      bottom: 12px;
      display: grid;
      grid-template-columns: repeat(4, minmax(76px, 1fr));
      gap: 8px;
      width: min(470px, calc(100vw - 24px));
      padding: 8px;
    }

    .metric {
      min-width: 0;
      padding: 8px;
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.045);
    }

    .metric span {
      display: block;
      color: #91a3aa;
      font-size: 11px;
      line-height: 1.1;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 17px;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }

    .channels {
      right: 12px;
      top: 58px;
      width: min(330px, calc(100vw - 24px));
      padding: 10px;
    }

    .channel {
      display: grid;
      grid-template-columns: 38px 1fr 54px;
      align-items: center;
      gap: 8px;
      height: 22px;
      font-size: 12px;
      color: #c8d6dc;
    }

    .bar {
      position: relative;
      height: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
    }

    .bar-fill {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 0%;
      background: #5ad4c7;
    }

    .value {
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: #eef4f7;
    }

    .mapping {
      left: 12px;
      top: 58px;
      display: grid;
      grid-template-columns: repeat(2, minmax(116px, 1fr));
      gap: 8px;
      width: min(320px, calc(100vw - 24px));
      padding: 10px;
    }

    .field {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .field label {
      color: #91a3aa;
      font-size: 11px;
    }

    .message {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 4;
      max-width: min(380px, calc(100vw - 24px));
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      background: rgba(15, 19, 21, 0.82);
      color: #b8c6cb;
      font-size: 13px;
      line-height: 1.35;
      backdrop-filter: blur(14px);
    }

    @media (max-width: 820px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .actions {
        width: 100%;
      }

      button {
        flex: 1;
      }

      .mapping,
      .channels {
        top: 100px;
      }

      .channels {
        display: none;
      }

      .telemetry {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        bottom: 76px;
      }

      .message {
        left: 12px;
        right: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">ELRS Drone Simulator</div>
    <div class="actions">
      <button id="connectButton" class="primary">Connect Serial</button>
      <button id="resetButton">Reset</button>
    </div>
  </div>

  <div class="panel mapping">
    <div class="field"><label for="rollMap">Roll</label><select id="rollMap"></select></div>
    <div class="field"><label for="pitchMap">Pitch</label><select id="pitchMap"></select></div>
    <div class="field"><label for="throttleMap">Throttle</label><select id="throttleMap"></select></div>
    <div class="field"><label for="yawMap">Yaw</label><select id="yawMap"></select></div>
    <div class="field"><label for="armMap">Arm</label><select id="armMap"></select></div>
  </div>

  <div class="panel channels" id="channels"></div>

  <div class="panel telemetry">
    <div class="metric"><span>Link</span><strong id="linkValue">DOWN</strong></div>
    <div class="metric"><span>Throttle</span><strong id="throttleValue">0%</strong></div>
    <div class="metric"><span>Altitude</span><strong id="altitudeValue">0.0 m</strong></div>
    <div class="metric"><span>Speed</span><strong id="speedValue">0.0 m/s</strong></div>
    <div class="metric"><span>Roll</span><strong id="rollValue">0.0 deg</strong></div>
    <div class="metric"><span>Pitch</span><strong id="pitchValue">0.0 deg</strong></div>
    <div class="metric"><span>Yaw</span><strong id="yawValue">0.0 deg</strong></div>
    <div class="metric"><span>LQ</span><strong id="lqValue">0%</strong></div>
  </div>

  <div id="message" class="message">Ready.</div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js";

    const connectButton = document.querySelector("#connectButton");
    const resetButton = document.querySelector("#resetButton");
    const message = document.querySelector("#message");
    const channelsEl = document.querySelector("#channels");
    const rollMap = document.querySelector("#rollMap");
    const pitchMap = document.querySelector("#pitchMap");
    const throttleMap = document.querySelector("#throttleMap");
    const yawMap = document.querySelector("#yawMap");
    const armMap = document.querySelector("#armMap");
    const linkValue = document.querySelector("#linkValue");
    const throttleValue = document.querySelector("#throttleValue");
    const altitudeValue = document.querySelector("#altitudeValue");
    const speedValue = document.querySelector("#speedValue");
    const rollValue = document.querySelector("#rollValue");
    const pitchValue = document.querySelector("#pitchValue");
    const yawValue = document.querySelector("#yawValue");
    const lqValue = document.querySelector("#lqValue");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f1315);
    scene.fog = new THREE.Fog(0x0f1315, 12, 42);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 120);
    camera.position.set(7, 5.5, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.HemisphereLight(0xddeeff, 0x161d21, 1.9));

    const keyLight = new THREE.DirectionalLight(0xffffff, 2.8);
    keyLight.position.set(4, 8, 5);
    keyLight.castShadow = true;
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0x77dccf, 0.75);
    fillLight.position.set(-6, 4, -5);
    scene.add(fillLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(80, 80),
      new THREE.MeshStandardMaterial({ color: 0x1b2327, roughness: 0.74 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(80, 80, 0x334047, 0x263038);
    grid.position.y = 0.01;
    scene.add(grid);

    const drone = new THREE.Group();
    scene.add(drone);

    const bodyMaterial = new THREE.MeshStandardMaterial({ color: 0x4fd2c3, roughness: 0.35, metalness: 0.12 });
    const armMaterial = new THREE.MeshStandardMaterial({ color: 0xe7eef1, roughness: 0.44, metalness: 0.1 });
    const darkMaterial = new THREE.MeshStandardMaterial({ color: 0x20292f, roughness: 0.5, metalness: 0.18 });
    const noseMaterial = new THREE.MeshStandardMaterial({ color: 0xffd35f, roughness: 0.32, metalness: 0.1 });
    const propMaterial = new THREE.MeshStandardMaterial({ color: 0x93f1e9, roughness: 0.2, metalness: 0.05 });

    const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.28, 1.08), bodyMaterial);
    body.castShadow = true;
    drone.add(body);

    const nose = new THREE.Mesh(new THREE.ConeGeometry(0.22, 0.58, 4), noseMaterial);
    nose.rotation.x = -Math.PI / 2;
    nose.rotation.z = Math.PI / 4;
    nose.position.z = -0.82;
    nose.castShadow = true;
    drone.add(nose);

    const armX = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.055, 3.2, 24), armMaterial);
    armX.rotation.z = Math.PI / 2;
    armX.castShadow = true;
    drone.add(armX);

    const armZ = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.055, 2.45, 24), armMaterial);
    armZ.rotation.x = Math.PI / 2;
    armZ.castShadow = true;
    drone.add(armZ);

    const rotors = [];
    for (const [x, z] of [[-1.55, -1.08], [1.55, -1.08], [-1.55, 1.08], [1.55, 1.08]]) {
      const rotor = new THREE.Group();
      rotor.position.set(x, 0.03, z);

      const ring = new THREE.Mesh(new THREE.TorusGeometry(0.35, 0.025, 12, 48), darkMaterial);
      ring.rotation.x = Math.PI / 2;
      ring.castShadow = true;
      rotor.add(ring);

      const prop = new THREE.Group();
      const bladeA = new THREE.Mesh(new THREE.BoxGeometry(0.68, 0.022, 0.06), propMaterial);
      const bladeB = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.022, 0.68), propMaterial);
      bladeA.position.y = 0.055;
      bladeB.position.y = 0.055;
      prop.add(bladeA, bladeB);
      rotor.add(prop);

      const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.055, 24), noseMaterial);
      hub.castShadow = true;
      rotor.add(hub);

      drone.add(rotor);
      rotors.push(prop);
    }

    const channelRows = [];
    for (let i = 1; i <= 16; i++) {
      const row = document.createElement("div");
      row.className = "channel";
      const label = document.createElement("div");
      label.textContent = `CH${String(i).padStart(2, "0")}`;
      const bar = document.createElement("div");
      bar.className = "bar";
      const fill = document.createElement("div");
      fill.className = "bar-fill";
      bar.appendChild(fill);
      const value = document.createElement("div");
      value.className = "value";
      value.textContent = "----";
      row.append(label, bar, value);
      channelsEl.appendChild(row);
      channelRows.push({ fill, value });
    }

    function fillSelect(select, selected) {
      for (let i = 1; i <= 16; i++) {
        const option = document.createElement("option");
        option.value = String(i);
        option.textContent = `CH${i}`;
        if (i === selected) {
          option.selected = true;
        }
        select.appendChild(option);
      }
    }

    fillSelect(rollMap, 1);
    fillSelect(pitchMap, 2);
    fillSelect(throttleMap, 3);
    fillSelect(yawMap, 4);
    fillSelect(armMap, 5);

    const rc = {
      link: false,
      lq: 0,
      channels: Array(16).fill(1500),
      lastSample: 0
    };

    const state = {
      position: new THREE.Vector3(0, 0.25, 0),
      velocity: new THREE.Vector3(),
      roll: 0,
      pitch: 0,
      yaw: 0,
      yawRate: 0
    };

    let port;
    let reader;
    let connected = false;
    let readBuffer = "";
    let lastFrameTime = performance.now();

    function setMessage(text) {
      message.textContent = text;
    }

    function channel(index) {
      return rc.channels[index - 1] ?? 1500;
    }

    function stick(index) {
      return Math.max(-1, Math.min(1, (channel(index) - 1500) / 500));
    }

    function throttle(index) {
      return Math.max(0, Math.min(1, (channel(index) - 1000) / 1000));
    }

    function isArmed() {
      return rc.link && channel(Number(armMap.value)) > 1500;
    }

    function resetSimulation() {
      state.position.set(0, 0.25, 0);
      state.velocity.set(0, 0, 0);
      state.roll = 0;
      state.pitch = 0;
      state.yaw = 0;
      state.yawRate = 0;
      setMessage("Reset.");
    }

    function parseRcLine(line) {
      const trimmed = line.trim();
      if (!trimmed.startsWith("RC,")) {
        return;
      }

      const parts = trimmed.split(",");
      if (parts.length < 25) {
        return;
      }

      const values = parts.slice(1).map(Number);
      if (values.some(Number.isNaN)) {
        return;
      }

      rc.link = values[1] === 1;
      rc.lq = values[4];
      rc.channels = values.slice(8, 24);
      rc.lastSample = performance.now();
    }

    async function readSerial() {
      const decoder = new TextDecoder();

      while (port.readable && connected) {
        reader = port.readable.getReader();
        try {
          while (connected) {
            const { value, done } = await reader.read();
            if (done) {
              break;
            }

            readBuffer += decoder.decode(value, { stream: true });
            const lines = readBuffer.split(/\r?\n/);
            readBuffer = lines.pop() ?? "";

            for (const line of lines) {
              parseRcLine(line);
            }
          }
        } finally {
          reader.releaseLock();
          reader = undefined;
        }
      }
    }

    async function connectSerial() {
      if (!("serial" in navigator)) {
        setMessage("Web Serial needs Chrome or Edge on localhost.");
        return;
      }

      try {
        port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        connected = true;
        connectButton.textContent = "Disconnect";
        setMessage("Connected.");
        await readSerial();
      } catch (error) {
        setMessage(error.message);
      }
    }

    async function disconnectSerial() {
      connected = false;
      if (reader) {
        await reader.cancel();
      }
      if (port) {
        await port.close();
      }
      port = undefined;
      connectButton.textContent = "Connect Serial";
      setMessage("Disconnected.");
    }

    connectButton.addEventListener("click", async () => {
      if (connected) {
        await disconnectSerial();
      } else {
        await connectSerial();
      }
    });

    resetButton.addEventListener("click", resetSimulation);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function updatePhysics(dt) {
      const sampleAge = performance.now() - rc.lastSample;
      const live = rc.link && sampleAge < 500;
      const armed = isArmed();
      const rollInput = live ? stick(Number(rollMap.value)) : 0;
      const pitchInput = live ? stick(Number(pitchMap.value)) : 0;
      const yawInput = live ? stick(Number(yawMap.value)) : 0;
      const throttleInput = live && armed ? throttle(Number(throttleMap.value)) : 0;

      const maxTilt = THREE.MathUtils.degToRad(34);
      const targetRoll = -rollInput * maxTilt;
      const targetPitch = pitchInput * maxTilt;
      state.roll += (targetRoll - state.roll) * Math.min(1, dt * 8);
      state.pitch += (targetPitch - state.pitch) * Math.min(1, dt * 8);
      state.yawRate += (yawInput * 2.4 - state.yawRate) * Math.min(1, dt * 7);
      state.yaw += state.yawRate * dt;

      const hoverThrottle = 0.52;
      const verticalAccel = (throttleInput - hoverThrottle) * 13.0;
      state.velocity.y += verticalAccel * dt;

      const forwardAccel = -Math.sin(state.pitch) * throttleInput * 9.0;
      const sideAccel = Math.sin(state.roll) * throttleInput * 9.0;
      const yawSin = Math.sin(state.yaw);
      const yawCos = Math.cos(state.yaw);
      state.velocity.x += (sideAccel * yawCos + forwardAccel * yawSin) * dt;
      state.velocity.z += (forwardAccel * yawCos - sideAccel * yawSin) * dt;

      state.velocity.multiplyScalar(Math.max(0, 1 - dt * 0.22));
      state.position.addScaledVector(state.velocity, dt);

      if (state.position.y < 0.24) {
        state.position.y = 0.24;
        if (state.velocity.y < 0) {
          state.velocity.y = 0;
        }
      }

      const maxDistance = 20;
      state.position.x = THREE.MathUtils.clamp(state.position.x, -maxDistance, maxDistance);
      state.position.z = THREE.MathUtils.clamp(state.position.z, -maxDistance, maxDistance);

      drone.position.copy(state.position);
      drone.rotation.set(state.pitch, state.yaw, state.roll, "YXZ");

      const propSpeed = armed ? 0.35 + throttleInput * 2.2 : 0.06;
      for (let i = 0; i < rotors.length; i++) {
        rotors[i].rotation.y += propSpeed * (i % 2 === 0 ? 1 : -1);
      }

      const cameraTarget = new THREE.Vector3(state.position.x, state.position.y + 0.5, state.position.z);
      const cameraOffset = new THREE.Vector3(7, 5.5, 8);
      camera.position.lerp(cameraTarget.clone().add(cameraOffset), Math.min(1, dt * 2.5));
      camera.lookAt(cameraTarget);

      const speed = state.velocity.length();
      linkValue.textContent = live ? (armed ? "ARMED" : "UP") : "DOWN";
      throttleValue.textContent = `${Math.round(throttleInput * 100)}%`;
      altitudeValue.textContent = `${state.position.y.toFixed(1)} m`;
      speedValue.textContent = `${speed.toFixed(1)} m/s`;
      rollValue.textContent = `${THREE.MathUtils.radToDeg(state.roll).toFixed(1)} deg`;
      pitchValue.textContent = `${THREE.MathUtils.radToDeg(state.pitch).toFixed(1)} deg`;
      yawValue.textContent = `${THREE.MathUtils.radToDeg(state.yaw).toFixed(1)} deg`;
      lqValue.textContent = `${rc.lq}%`;

      for (let i = 0; i < channelRows.length; i++) {
        const us = rc.channels[i] ?? 1500;
        const pct = THREE.MathUtils.clamp((us - 1500) / 500, -1, 1);
        const width = Math.abs(pct) * 50;
        channelRows[i].fill.style.left = pct >= 0 ? "50%" : `${50 - width}%`;
        channelRows[i].fill.style.width = `${width}%`;
        channelRows[i].value.textContent = String(Math.round(us));
      }

      if (connected && sampleAge > 1000) {
        setMessage("Connected. Waiting for RC frames.");
      } else if (live) {
        setMessage(armed ? "Link up. Armed." : "Link up.");
      }
    }

    function animate(now) {
      requestAnimationFrame(animate);
      const dt = Math.min(0.05, (now - lastFrameTime) / 1000);
      lastFrameTime = now;
      updatePhysics(dt);
      renderer.render(scene, camera);
    }

    resetSimulation();
    animate(performance.now());
  </script>
</body>
</html>
